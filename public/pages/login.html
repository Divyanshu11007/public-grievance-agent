<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Smart Governance</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0f1e 0%, #0d1525 50%, #0a0f1e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(59, 130, 246, 0.15) 0%, transparent 50%);
            animation: pulse 8s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: translate(0, 0); opacity: 0.5; }
            50% { transform: translate(-5%, -5%); opacity: 1; }
        }
        .login-container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
            animation: slideIn 0.5s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .login-card {
            background: rgba(15, 25, 45, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 45px 40px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        /* Professional Logo */
        .logo {
            text-align: center;
            margin-bottom: 40px;
        }
        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px;
            box-shadow: 0 15px 35px rgba(37, 99, 235, 0.3);
            position: relative;
            overflow: hidden;
        }
        .logo-icon::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }
        @keyframes shine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }
        .logo-icon i {
            font-size: 40px;
            color: white;
            position: relative;
            z-index: 1;
        }
        .logo h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo .tagline {
            color: #64748b;
            font-size: 12px;
            margin-top: 8px;
            letter-spacing: 1px;
            font-weight: 500;
        }
        .input-group { margin-bottom: 20px; }
        .input-group input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(10, 20, 35, 0.9);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 14px;
            color: white;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        .input-group input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
        }
        .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4); }
        .register-link { text-align: center; margin-top: 25px; color: #94a3b8; }
        .register-link a { color: #3b82f6; text-decoration: none; font-weight: 600; }
        .demo-card {
            background: rgba(10, 20, 35, 0.5);
            border-radius: 16px;
            padding: 20px;
            margin-top: 25px;
            border: 1px solid rgba(59, 130, 246, 0.15);
        }
        .demo-card h3 { font-size: 13px; margin-bottom: 12px; color: #3b82f6; text-transform: uppercase; letter-spacing: 1px; }
        .demo-card p { font-size: 12px; color: #cbd5e1; margin-bottom: 6px; }
        @media (max-width: 480px) { .login-card { padding: 30px 25px; } }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="login-container">
        <div class="login-card">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-landmark"></i>
                </div>
                <h1>SmartGov</h1>
                <div class="tagline">GRIEVANCE RESOLUTION SYSTEM</div>
            </div>
            <form onsubmit="event.preventDefault(); loginUser();">
                <div class="input-group">
                    <input type="text" id="email" placeholder="Username or Email" required>
                </div>
                <div class="input-group">
                    <input type="password" id="password" placeholder="Password" required>
                </div>
                <button type="submit" class="btn-login"><i class="fas fa-arrow-right-to-bracket"></i> Sign In</button>
            </form>
            <div class="register-link">
                Don't have an account? <a href="/register.html">Create Account</a>
            </div>
            <div class="demo-card">
                <h3><i class="fas fa-id-card"></i> Demo Access</h3>
                <p><i class="fas fa-user-shield"></i> Administrator: admin / admin123</p>
                <p><i class="fas fa-user-tie"></i> Officer: officer / officer123</p>
                <p><i class="fas fa-user"></i> Citizen: citizen / citizen123</p>
            </div>
        </div>
    </div>
    <script>
        const API_URL = "http://localhost:5000/api";
        async function loginUser() {
            const username = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if (!username || !password) { alert("Please fill all fields"); return; }
            try {
                const res = await fetch(`${API_URL}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    if (data.user.role === 'admin') window.location.href = '/admin.html';
                    else if (data.user.role === 'officer') window.location.href = '/officer.html';
                    else window.location.href = '/citizen.html';
                } else { alert(data.message); }
            } catch (error) { alert('Server error'); }
        }
    </script>
</body>
</html>
