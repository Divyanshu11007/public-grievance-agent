<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Smart Governance</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0a0f1e 0%, #0d1525 50%, #0a0f1e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 20% 50%, rgba(59, 130, 246, 0.15) 0%, transparent 50%);
            animation: pulse 8s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: translate(0, 0); opacity: 0.5; }
            50% { transform: translate(-5%, -5%); opacity: 1; }
        }
        .register-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            animation: slideIn 0.5s ease-out;
        }
        @keyframes slideIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .register-card {
            background: rgba(15, 25, 45, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 40px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        /* Professional Logo */
        .logo {
            text-align: center;
            margin-bottom: 35px;
        }
        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #2563eb, #7c3aed);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 18px;
            box-shadow: 0 15px 35px rgba(37, 99, 235, 0.3);
            position: relative;
            overflow: hidden;
        }
        .logo-icon::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }
        @keyframes shine {
            0% { transform: translateX(-100%) rotate(45deg); }
            100% { transform: translateX(100%) rotate(45deg); }
        }
        .logo-icon i {
            font-size: 40px;
            color: white;
            position: relative;
            z-index: 1;
        }
        .logo h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .logo .tagline {
            color: #64748b;
            font-size: 12px;
            margin-top: 8px;
            letter-spacing: 1px;
            font-weight: 500;
        }
        input, select {
            width: 100%;
            padding: 14px 16px;
            margin-bottom: 15px;
            background: rgba(10, 20, 35, 0.9);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 14px;
            color: white;
            font-size: 14px;
            transition: all 0.3s ease;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }
        .btn-register {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s ease;
        }
        .btn-register:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4); }
        .login-link { text-align: center; margin-top: 20px; color: #94a3b8; }
        .login-link a { color: #3b82f6; text-decoration: none; font-weight: 600; }
        .features {
            margin-top: 25px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        .feature-item {
            background: rgba(59, 130, 246, 0.08);
            border: 1px solid rgba(59, 130, 246, 0.2);
            padding: 12px;
            border-radius: 12px;
            font-size: 12px;
            text-align: center;
            color: #cbd5e1;
            transition: all 0.3s ease;
        }
        .feature-item:hover {
            background: rgba(59, 130, 246, 0.15);
            border-color: #3b82f6;
            transform: translateY(-2px);
        }
        .feature-item i { color: #3b82f6; margin-right: 8px; }
        @media (max-width: 480px) { 
            .register-card { padding: 30px 25px; } 
            .features { grid-template-columns: 1fr; } 
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="register-container">
        <div class="register-card">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fas fa-landmark"></i>
                </div>
                <h1>SmartGov</h1>
                <div class="tagline">GRIEVANCE RESOLUTION SYSTEM</div>
            </div>
            <form onsubmit="event.preventDefault(); registerUser();">
                <input type="text" id="name" placeholder="Full Name" required>
                <input type="text" id="username" placeholder="Username" required>
                <input type="email" id="email" placeholder="Email Address" required>
                <input type="password" id="password" placeholder="Password" required>
                <select id="role" required>
                    <option value="">Select Role</option>
                    <option value="citizen">Citizen</option>
                    <option value="officer">Officer</option>
                    <option value="admin">Admin</option>
                </select>
                <button type="submit" class="btn-register"><i class="fas fa-user-plus"></i> Create Account</button>
            </form>
            <div class="login-link">Already have an account? <a href="/login.html">Sign In</a></div>
            <div class="features">
                <div class="feature-item"><i class="fas fa-robot"></i> AI Complaint Detection</div>
                <div class="feature-item"><i class="fas fa-bell"></i> Real-Time Alerts</div>
                <div class="feature-item"><i class="fas fa-chart-line"></i> Smart Analytics</div>
                <div class="feature-item"><i class="fas fa-comment-dots"></i> AI Chatbot Support</div>
            </div>
        </div>
    </div>
    <script>
        const API_URL = "http://localhost:5000/api";
        async function registerUser() {
            const name = document.getElementById('name').value;
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            if (!name || !username || !email || !password || !role) { 
                alert("Please fill all fields"); 
                return; 
            }
            try {
                const res = await fetch(`${API_URL}/auth/register`, {
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, username, email, password, role })
                });
                const data = await res.json();
                if (data.success) { 
                    alert("✅ Registration successful! Please login."); 
                    window.location.href = '/login.html'; 
                } else { 
                    alert("❌ " + data.message); 
                }
            } catch (error) { 
                alert("❌ Server error. Make sure server is running."); 
            }
        }
    </script>
</body>
</html>
